<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="24小时昼夜日晷时钟 · 随太阳方位转动的晷针阴影 · 农历月相节气">
  <meta name="theme-color" content="#0a0e1a">
  <title>日晷 · 24时辰 · 月相历法</title>
  <style>
    :root {
      --sky-top: #0a0e1a;
      --sky-mid: #1a2540;
      --sky-bottom: #2d3a5c;
      --dial-face: #c9a86c;
      --dial-rim: #8b6914;
      --dial-inner: #d4b87a;
      --shadow: rgba(20, 12, 5, 0.72);
      --text: #f5e6c8;
      --accent: #ffd166;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: "Noto Serif SC", "Source Han Serif SC", "STSong", "SimSun", serif;
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 45%, var(--sky-bottom) 100%);
      transition: background 1.2s ease;
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.5s ease;
    }

    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--dur, 3s) ease-in-out infinite alternate;
    }

    .star.dim { opacity: 0.15; animation: none; }
    .star.bright { animation-duration: 1.5s; }

    @keyframes twinkle {
      from { opacity: 0.3; }
      to { opacity: 1; }
    }

    @keyframes pulseGlow {
      0%, 100% { opacity: 0.7; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.04); }
    }

    @keyframes floatMoon {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    .sun, .moon {
      position: fixed;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      pointer-events: none;
      transition: transform 2s ease, opacity 2s ease;
      z-index: 0;
    }

    .sun {
      background: radial-gradient(circle at 35% 35%, #fff9c4, #ffd54f 40%, #ff8f00);
      box-shadow: 0 0 50px 18px rgba(255, 193, 7, 0.4);
      animation: pulseGlow 6s ease-in-out infinite;
    }

    .moon {
      background: radial-gradient(circle at 35% 35%, #f0f4ff, #b0bec5 50%, #78909c);
      box-shadow: 0 0 30px 10px rgba(176, 190, 197, 0.3);
      animation: floatMoon 5s ease-in-out infinite;
    }

    header {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 12px 16px 4px;
    }

    header h1 {
      font-size: clamp(1.1rem, 4.5vw, 1.6rem);
      font-weight: 600;
      letter-spacing: 0.3em;
      color: #f0d878;
      text-shadow: 0 1px 12px rgba(0, 0, 0, 0.5);
    }

    .sub-title {
      font-size: clamp(0.62rem, 2.6vw, 0.78rem);
      opacity: 0.65;
      margin-top: 3px;
      letter-spacing: 0.15em;
      transition: opacity 0.6s ease;
    }

    .clock-wrap {
      position: relative;
      z-index: 2;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: min(92vw, 92vh, 520px);
      aspect-ratio: 1;
      padding: 8px;
    }

    .dial-plate {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 12px 32px rgba(0, 0, 0, 0.45));
    }

    .time-display {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 6px 16px 12px;
    }

    .digital-time {
      font-size: clamp(2rem, 9vw, 3rem);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.08em;
      font-weight: 600;
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.45);
      transition: color 0.5s ease;
    }

    .period-label {
      font-size: clamp(0.85rem, 3.2vw, 1rem);
      margin-top: 2px;
      opacity: 0.8;
      letter-spacing: 0.25em;
    }

    .date-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 5px;
      font-size: clamp(0.72rem, 2.8vw, 0.85rem);
      opacity: 0.7;
      flex-wrap: wrap;
      letter-spacing: 0.06em;
    }

    .date-wrap .sep { opacity: 0.3; }

    .lunar-badge {
      display: inline-block;
      padding: 1px 10px;
      border-radius: 10px;
      background: rgba(255, 209, 102, 0.12);
      border: 1px solid rgba(255, 209, 102, 0.15);
      font-size: clamp(0.6rem, 2.3vw, 0.72rem);
      color: #e8d080;
      letter-spacing: 0.08em;
    }

    .extra-info {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-top: 6px;
      font-size: clamp(0.58rem, 2.2vw, 0.7rem);
      opacity: 0.5;
      letter-spacing: 0.05em;
      transition: opacity 0.5s ease;
      flex-wrap: wrap;
    }

    .extra-info .item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .moon-phase-icon {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #d4c8a0;
      vertical-align: middle;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 2px rgba(0,0,0,0.3);
    }
    .moon-phase-icon .mask {
      position: absolute;
      top: 0; bottom: 0;
      background: #1a1a2e;
    }
    .moon-phase-icon .mask-l {
      left: 0;
      width: 50%;
      border-radius: 7px 0 0 7px;
    }
    .moon-phase-icon .mask-r {
      right: 0;
      width: 50%;
      border-radius: 0 7px 7px 0;
    }

    .day-progress {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      max-width: 160px;
    }
    .day-progress-track {
      flex: 1;
      height: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 1px;
      overflow: hidden;
      position: relative;
    }
    .day-progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), #f0a050);
      border-radius: 1px;
      transition: width 1s ease;
    }

    .day-progress-label {
      font-size: 0.6rem;
      width: 3.2em;
      text-align: right;
      opacity: 0.55;
    }

    .solar-info {
      font-size: clamp(0.6rem, 2.3vw, 0.7rem);
      opacity: 0.45;
      margin-top: 3px;
      letter-spacing: 0.08em;
      transition: opacity 0.5s ease;
    }

    footer {
      position: relative;
      z-index: 2;
      font-size: 0.65rem;
      opacity: 0.4;
      padding-bottom: 8px;
      letter-spacing: 0.1em;
    }

    @media (max-width: 420px) {
      .extra-info { gap: 8px; }
      .day-progress { max-width: 100px; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="sun" id="sun"></div>
  <div class="moon" id="moon"></div>

  <header>
    <h1>日 晷</h1>
    <div class="sub-title">二十四时轮 · 日行月移</div>
  </header>

  <div class="clock-wrap">
    <svg class="dial-plate" viewBox="0 0 400 400" aria-label="24小时日晷表盘">
      <defs>
        <radialGradient id="faceGrad" cx="50%" cy="45%" r="55%">
          <stop offset="0%" stop-color="#e8d5a8"/>
          <stop offset="70%" stop-color="#c9a86c"/>
          <stop offset="100%" stop-color="#a08040"/>
        </radialGradient>
        <radialGradient id="innerGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#d4b87a" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="#8b6914" stop-opacity="0.15"/>
        </radialGradient>
        <filter id="shadowBlur">
          <feGaussianBlur stdDeviation="3"/>
        </filter>
        <linearGradient id="gnomonGrad" x1="0%" y1="100%" x2="0%" y2="0%">
          <stop offset="0%" stop-color="#5c4033"/>
          <stop offset="100%" stop-color="#8b6914"/>
        </linearGradient>
      </defs>

      <!-- 外圈石质边框 -->
      <circle cx="200" cy="200" r="196" fill="none" stroke="#6b4f1a" stroke-width="8"/>
      <circle cx="200" cy="200" r="188" fill="url(#faceGrad)" stroke="#8b6914" stroke-width="2"/>

      <!-- 内圈装饰 -->
      <circle cx="200" cy="200" r="170" fill="url(#innerGrad)" stroke="#a08040" stroke-width="1" stroke-dasharray="4 6"/>

      <!-- 刻度与数字由 JS 绘制 -->
      <g id="ticks"></g>

      <!-- 方位标记 -->
      <text x="200" y="36" text-anchor="middle" fill="#5c3d0e" font-size="13" font-weight="600" opacity="0.8">子</text>
      <text x="364" y="206" text-anchor="middle" fill="#5c3d0e" font-size="13" font-weight="600" opacity="0.8">午</text>
      <text x="200" y="378" text-anchor="middle" fill="#5c3d0e" font-size="13" font-weight="600" opacity="0.8">午</text>
      <text x="36" y="206" text-anchor="middle" fill="#5c3d0e" font-size="13" font-weight="600" opacity="0.8">卯</text>

      <!-- 晷针阴影 -->
      <g id="shadowGroup" filter="url(#shadowBlur)">
        <polygon id="shadow" points="200,200 200,200 200,200" fill="var(--shadow)" opacity="0.85"/>
      </g>

      <!-- 昼夜进度弧 -->
      <path id="progressArc" fill="none" stroke="var(--accent)" stroke-width="2.5"
        stroke-linecap="round" opacity="0.3"
        d="M 200 30 A 170 170 0 0 1 370 200"/>

      <!-- 晷针 -->
      <polygon points="200,200 196,120 204,120" fill="url(#gnomonGrad)" stroke="#4a3018" stroke-width="0.8"/>
      <circle cx="200" cy="200" r="6" fill="#5c4033" stroke="#3e2723" stroke-width="1"/>
      <circle cx="200" cy="200" r="2.5" fill="#8b6914"/>
    </svg>
  </div>

  <div class="time-display">
    <div class="digital-time" id="digitalTime">00:00:00</div>
    <div class="period-label" id="periodLabel">子时</div>
    <div class="date-wrap" id="dateWrap">
      <span id="dateText">—</span>
      <span class="sep">·</span>
      <span class="lunar-badge" id="lunarBadge">—</span>
    </div>
    <div class="extra-info" id="extraInfo">
      <span class="item" id="moonPhaseItem">
        <span class="moon-phase-icon" id="moonIcon">
          <span class="mask mask-l" id="moonMaskL"></span>
          <span class="mask mask-r" id="moonMaskR"></span>
        </span>
        <span id="moonPhaseLabel">—</span>
      </span>
      <span class="item" id="solarTermItem">
        <span id="solarTermLabel">—</span>
      </span>
      <span class="item day-progress">
        <span class="day-progress-track"><span class="day-progress-fill" id="progressFill"></span></span>
        <span class="day-progress-label" id="progressLabel">0%</span>
      </span>
    </div>
    <div class="solar-info" id="solarInfo">晷影指向 —</div>
  </div>

  <footer>依本地时间运转 · 日晷示时</footer>

  <script>
    const SHICHEN = [
      '子时', '丑时', '寅时', '卯时', '辰时', '巳时',
      '午时', '未时', '申时', '酉时', '戌时', '亥时'
    ];

    const SHICHEN_ZODIAC = [
      '鼠', '牛', '虎', '兔', '龙', '蛇',
      '马', '羊', '猴', '鸡', '狗', '猪'
    ];

    const TIANGAN = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
    const DIZHI   = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];

    const SOLAR_TERMS = [
      { name: '小寒', lon: 285 }, { name: '大寒', lon: 300 },
      { name: '立春', lon: 315 }, { name: '雨水', lon: 330 },
      { name: '惊蛰', lon: 345 }, { name: '春分', lon: 0 },
      { name: '清明', lon: 15 },  { name: '谷雨', lon: 30 },
      { name: '立夏', lon: 45 },  { name: '小满', lon: 60 },
      { name: '芒种', lon: 75 },  { name: '夏至', lon: 90 },
      { name: '小暑', lon: 105 }, { name: '大暑', lon: 120 },
      { name: '立秋', lon: 135 }, { name: '处暑', lon: 150 },
      { name: '白露', lon: 165 }, { name: '秋分', lon: 180 },
      { name: '寒露', lon: 195 }, { name: '霜降', lon: 210 },
      { name: '立冬', lon: 225 }, { name: '小雪', lon: 240 },
      { name: '大雪', lon: 255 }, { name: '冬至', lon: 270 }
    ];

    const WEEKDAYS = ['日', '一', '二', '三', '四', '五', '六'];

    const MOON_PHASES = [
      { name: '新月' }, { name: '蛾眉月' }, { name: '上弦月' }, { name: '盈凸月' },
      { name: '满月' }, { name: '亏凸月' }, { name: '下弦月' }, { name: '残月' }
    ];

    const PERIODS = [
      { start: 0,  end: 5,  label: '深夜', top: '#050810', mid: '#0a1020', bottom: '#121a30' },
      { start: 5,  end: 7,  label: '黎明', top: '#1a1535', mid: '#4a3060', bottom: '#c06040' },
      { start: 7,  end: 9,  label: '清晨', top: '#5080b0', mid: '#90b8d8', bottom: '#f0c878' },
      { start: 9,  end: 17, label: '白昼', top: '#2878c8', mid: '#68b0e8', bottom: '#d8e8f8' },
      { start: 17, end: 19, label: '黄昏', top: '#304878', mid: '#c06050', bottom: '#f0a050' },
      { start: 19, end: 21, label: '傍晚', top: '#1a2040', mid: '#403060', bottom: '#806080' },
      { start: 21, end: 24, label: '夜晚', top: '#080c18', mid: '#101828', bottom: '#1a2540' }
    ];

    const ticksGroup = document.getElementById('ticks');
    const shadowEl = document.getElementById('shadow');
    const digitalTime = document.getElementById('digitalTime');
    const periodLabel = document.getElementById('periodLabel');
    const solarInfo = document.getElementById('solarInfo');
    const dateText = document.getElementById('dateText');
    const lunarBadge = document.getElementById('lunarBadge');
    const progressFill = document.getElementById('progressFill');
    const progressLabel = document.getElementById('progressLabel');
    const moonPhaseLabel = document.getElementById('moonPhaseLabel');
    const moonMaskL = document.getElementById('moonMaskL');
    const moonMaskR = document.getElementById('moonMaskR');
    const solarTermLabel = document.getElementById('solarTermLabel');
    const progressArc = document.getElementById('progressArc');
    const starsEl = document.getElementById('stars');
    const sunEl = document.getElementById('sun');
    const moonEl = document.getElementById('moon');

    const CX = 200, CY = 200, R_TICK = 175, R_NUM = 155;

    // ─── 天文计算 ──────────────────────────────────────

    function solarLongitude(date) {
      const y = date.getFullYear();
      const dayOfYear = Math.floor((date - new Date(y, 0, 0)) / 864e5);
      return ((dayOfYear - 80) / 365.25 * 360) % 360;
    }

    function getSolarTerm(date) {
      const lon = solarLongitude(date);
      let closest = SOLAR_TERMS[0];
      let minDist = Infinity;
      for (const st of SOLAR_TERMS) {
        let d = Math.abs(lon - st.lon);
        if (d > 180) d = 360 - d;
        if (d < minDist) { minDist = d; closest = st; }
      }
      if (minDist > 4) return null;
      return closest;
    }

    function moonPhase(date) {
      const ref = new Date('2000-01-06T18:14:00Z');
      const days = (date - ref) / 864e5;
      const phase = ((days % 29.53058867) / 29.53058867 + 1) % 1;
      return phase;
    }

    function getMoonPhaseInfo(date) {
      const p = moonPhase(date);
      const idx = Math.round(p * 8) % 8;
      return { phase: p, index: idx, name: MOON_PHASES[idx].name };
    }

    function getGanzhiYear(year) {
      const gan = TIANGAN[(year - 4) % 10];
      const zhi = DIZHI[(year - 4) % 12];
      return gan + zhi;
    }

    function getLunarDate(date) {
      const y = date.getFullYear();
      const springFestivals = {
        2020: { m: 1, d: 25 }, 2021: { m: 2, d: 12 }, 2022: { m: 2, d: 1 },
        2023: { m: 1, d: 22 }, 2024: { m: 2, d: 10 }, 2025: { m: 1, d: 29 },
        2026: { m: 2, d: 17 }, 2027: { m: 2, d: 6 }, 2028: { m: 1, d: 26 },
        2029: { m: 2, d: 13 }, 2030: { m: 2, d: 3 }
      };

      const sf = springFestivals[y];
      if (!sf) return { year: getGanzhiYear(y) + '年', month: '', day: '' };

      const springFestival = new Date(y, sf.m - 1, sf.d);
      const diff = Math.round((date - springFestival) / 864e5);

      if (diff < 0) {
        const prev = springFestivals[y - 1] || { m: 1, d: 23 };
        const prevSF = new Date(y - 1, prev.m - 1, prev.d);
        const prevDiff = Math.round((date - prevSF) / 864e5);
        if (prevDiff >= 0) return computeLunarFromSF(prevDiff, y - 1);
        return { year: getGanzhiYear(y - 1) + '年', month: '', day: '' };
      }

      return computeLunarFromSF(diff, y);
    }

    function computeLunarFromSF(daysSinceSF, year) {
      const monthDays = [30, 29, 30, 29, 30, 29, 30, 29, 30, 29, 30, 29, 30];
      let remaining = daysSinceSF;
      let month = 1;
      for (let i = 0; i < monthDays.length; i++) {
        if (remaining < monthDays[i]) { month = i + 1; break; }
        remaining -= monthDays[i];
      }
      if (month > 12) { month = 12; remaining = Math.min(remaining, 29); }

      const day = Math.floor(remaining) + 1;
      const cnMonths = ['正', '二', '三', '四', '五', '六', '七', '八', '九', '十', '冬', '腊'];
      const cnDays = [
        '初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
        '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
        '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'
      ];
      return {
        year: getGanzhiYear(year) + '年',
        month: cnMonths[(month - 1) % 12] + '月',
        day: cnDays[Math.min(day - 1, 29)]
      };
    }

    // ─── 表盘绘制 ──────────────────────────────────────

    function shadowAngleDeg(hours) {
      return ((hours + 6) % 24) * 15;
    }

    function buildTicks() {
      const ns = 'http://www.w3.org/2000/svg';
      for (let h = 0; h < 24; h++) {
        const rad = shadowAngleDeg(h) * Math.PI / 180;
        const isMajor = h % 6 === 0;
        const isHalf = h % 3 === 0;
        const len = isMajor ? 18 : isHalf ? 12 : 7;
        const x1 = CX + Math.cos(rad) * (R_TICK - len);
        const y1 = CY + Math.sin(rad) * (R_TICK - len);
        const x2 = CX + Math.cos(rad) * R_TICK;
        const y2 = CY + Math.sin(rad) * R_TICK;

        const line = document.createElementNS(ns, 'line');
        line.setAttribute('x1', x1);
        line.setAttribute('y1', y1);
        line.setAttribute('x2', x2);
        line.setAttribute('y2', y2);
        line.setAttribute('stroke', '#5c3d0e');
        line.setAttribute('stroke-width', isMajor ? 2.2 : isHalf ? 1.4 : 0.8);
        line.setAttribute('opacity', isMajor ? 0.9 : 0.65);
        ticksGroup.appendChild(line);

        const nx = CX + Math.cos(rad) * R_NUM;
        const ny = CY + Math.sin(rad) * R_NUM;
        const text = document.createElementNS(ns, 'text');
        text.setAttribute('x', nx);
        text.setAttribute('y', ny);
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('dominant-baseline', 'central');
        text.setAttribute('fill', '#4a3010');
        text.setAttribute('font-size', isMajor ? '14' : '10');
        text.setAttribute('font-weight', isMajor ? '600' : '400');
        text.setAttribute('opacity', isMajor ? 0.95 : 0.7);
        text.textContent = String(h).padStart(2, '0');
        ticksGroup.appendChild(text);
      }
    }

    function buildStars() {
      for (let i = 0; i < 130; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const size = Math.random() * 2.5 + 0.3;
        if (Math.random() > 0.85) s.classList.add('bright');
        if (Math.random() < 0.15) s.classList.add('dim');
        s.style.cssText = `
          width:${size}px;height:${size}px;
          left:${Math.random() * 100}%;
          top:${Math.random() * 55}%;
          --dur:${2 + Math.random() * 4}s;
          animation-delay:${Math.random() * 3}s;
        `;
        starsEl.appendChild(s);
      }
    }

    function getShichen(hour) {
      return SHICHEN[Math.floor(((hour + 1) % 24) / 2)];
    }

    function getShichenZodiac(hour) {
      return SHICHEN_ZODIAC[Math.floor(((hour + 1) % 24) / 2)];
    }

    function getPeriod(hour) {
      return PERIODS.find(p => hour >= p.start && hour < p.end) || PERIODS[PERIODS.length - 1];
    }

    function lerpColor(a, b, t) {
      const parse = c => c.match(/\w\w/g).map(x => parseInt(x, 16));
      const ca = parse(a.slice(1)), cb = parse(b.slice(1));
      const mix = ca.map((v, i) => Math.round(v + (cb[i] - v) * t));
      return '#' + mix.map(v => v.toString(16).padStart(2, '0')).join('');
    }

    function updateSky(t) {
      let p1, p2, blend;

      for (let i = 0; i < PERIODS.length; i++) {
        const p = PERIODS[i];
        if (t >= p.start && t < p.end) {
          p1 = p;
          p2 = PERIODS[(i + 1) % PERIODS.length];
          blend = (t - p.start) / (p.end - p.start);
          break;
        }
      }
      if (!p1) p1 = PERIODS[PERIODS.length - 1], p2 = PERIODS[0], blend = 0;

      const root = document.documentElement.style;
      root.setProperty('--sky-top', lerpColor(p1.top, p2.top, blend));
      root.setProperty('--sky-mid', lerpColor(p1.mid, p2.mid, blend));
      root.setProperty('--sky-bottom', lerpColor(p1.bottom, p2.bottom, blend));

      const isNight = t < 5.5 || t >= 18.5;
      starsEl.style.opacity = isNight
        ? Math.min(1, t < 5.5 ? (5.5 - t) / 1.8 : (t - 18.5) / 1.8 + 0.2)
        : '0';

      const sunAngle = ((t - 6.5) / 11) * Math.PI;
      const sunX = 50 + Math.cos(sunAngle) * 38;
      const sunY = t < 6 || t >= 18 ? 120 : 8 + (1 - Math.cos(sunAngle)) * 10;
      const sunVis = t >= 5.5 && t < 18 ? 1 : 0;
      sunEl.style.opacity = sunVis;
      sunEl.style.transform = `translate(calc(${sunX}vw - 24px), calc(${sunY}vh - 24px))`;

      const moonAngle = ((t - 18.5) / 11) * Math.PI;
      const moonX = 50 + Math.cos(moonAngle) * 35;
      const moonY = 10 + (1 - Math.abs(Math.sin(moonAngle))) * 5;
      const moonVis = t < 6 || t >= 18 ? 1 : 0;
      moonEl.style.opacity = moonVis;
      moonEl.style.transform = `translate(calc(${moonX}vw - 24px), calc(${moonY}vh - 24px))`;
    }

    function updateShadow(fractionalHours) {
      const rad = shadowAngleDeg(fractionalHours) * Math.PI / 180;
      const shadowLen = 130;
      const shadowWidth = 22;
      const tipX = CX + Math.cos(rad) * shadowLen;
      const tipY = CY + Math.sin(rad) * shadowLen;
      const perpRad = rad + Math.PI / 2;
      const wX = Math.cos(perpRad) * shadowWidth / 2;
      const wY = Math.sin(perpRad) * shadowWidth / 2;

      shadowEl.setAttribute('points', [
        `${CX - wX},${CY - wY}`,
        `${CX + wX},${CY + wY}`,
        `${tipX + wX * 0.3},${tipY + wY * 0.3}`,
        `${tipX - wX * 0.3},${tipY - wY * 0.3}`
      ].join(' '));
    }

    function updateProgressArc(fractionalHours) {
      const pct = fractionalHours / 24;
      const angle = pct * 360;
      const largeArc = angle > 180 ? 1 : 0;
      const rad = angle * Math.PI / 180;
      const endX = CX + Math.sin(rad) * 170;
      const endY = CY - Math.cos(rad) * 170;
      progressArc.setAttribute('d',
        `M 200 30 A 170 170 0 ${largeArc} 1 ${endX.toFixed(1)} ${endY.toFixed(1)}`);
    }

    function updateInfo(now) {
      const h = now.getHours();
      const m = now.getMinutes();
      const s = now.getSeconds();
      const frac = h + m / 60 + s / 3600;

      digitalTime.textContent =
        `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;

      const shichen = getShichen(h);
      const zodiac = getShichenZodiac(h);
      const period = getPeriod(frac);
      periodLabel.textContent = `${shichen}（${zodiac}）· ${period.label}`;

      // 公历日期
      dateText.textContent =
        `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日 星期${WEEKDAYS[now.getDay()]}`;

      // 农历
      const lunar = getLunarDate(now);
      lunarBadge.textContent = `${lunar.year} ${lunar.month}${lunar.day}`;

      // 月相
      const mp = getMoonPhaseInfo(now);
      moonPhaseLabel.textContent = mp.name;
      const p = mp.phase;
      moonMaskL.style.width = (p <= 0.5 ? p * 2 * 50 : 50) + '%';
      moonMaskR.style.width = (p <= 0.5 ? 0 : (p - 0.5) * 2 * 50) + '%';

      // 节气
      const solarTerm = getSolarTerm(now);
      solarTermLabel.textContent = solarTerm ? '🌿 ' + solarTerm.name : '';

      // 晷影指向
      const sh = Math.floor(frac % 24);
      const sm = Math.floor((frac % 1) * 60);
      solarInfo.textContent = `晷影指向 ${String(sh).padStart(2, '0')}时${String(sm).padStart(2, '0')}分`;

      // 进度
      const pct = frac / 24 * 100;
      progressFill.style.width = pct + '%';
      progressLabel.textContent = pct.toFixed(1) + '%';
    }

    // ─── 主循环 ──────────────────────────────────────

    function tick() {
      const now = new Date();
      const frac = (now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600);
      updateShadow(frac);
      updateProgressArc(frac);
      updateSky(frac);
      requestAnimationFrame(tick);
    }

    buildTicks();
    buildStars();
    updateInfo(new Date());
    setInterval(() => updateInfo(new Date()), 1000);
    requestAnimationFrame(tick);
  </script>
</body>
</html>
